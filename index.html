<!DOCTYPE html>
<html>
<head>
    <title>My Slogan for "Online Safety"</title>
    <meta charset="UTF-8">
    <style>

        @keyframes bg-change {
            0% {background-position: 50% 0%;}
            60% {background-position: 50% 50%;}
            62% {background-position: 50% 80%}
            100% {background-position: 50% 90%;}
        }

        @keyframes text1 {
            0% {opacity: 0;}
            5% {opacity: 0;}
            5.1% {opacity: 1;}
            25% {opacity: 1;}
            25.1% {opacity: 0;}
            100% {opacity: 0;}
        }

        @keyframes text2 {
            0% {opacity: 0;}
            30% {opacity: 0;}
            30.1% {opacity: 1;}
            60% {opacity: 1; flex-direction: column; margin-top: 2.3rem;}
            60.01% {opacity: 1; flex-direction: row; margin-top: 0;}
            100% {opacity: 1; flex-direction: row; margin-top: 0;}
        }

        @keyframes text2b {
            0% {opacity: 0;}
            60% {opacity: 0;}
            60.01% {opacity: 1;}
            100% {opacity: 1;}
        }

        @keyframes text3 {
            0% {opacity: 0;}
            40% {opacity: 0; letter-spacing: -5rem;}
            62% {opacity: 0;}
            62.1% {opacity: 1;}
            100% {opacity: 1; letter-spacing: -1rem;}
        }

        body, .text1, .text2, .text2-b, .cursor, .text3 {animation: 12s linear infinite;}

        body {
            display: flex;
            justify-content: center; align-items: center;
            height: 100vh; weight: 100vw;
            margin: 0;
            background: linear-gradient(180deg, #07090f, #07090f, #07090f, #420a0a);
            background-size: 800% 800%;
            font-size: 30px;
            overflow: hidden;

            animation-name: bg-change;
        }

        .text1, .text2, .text3 {
            position: absolute;
            text-align: center;
        }

        .text1, .text2 { font-family: 'DejaVu Serif', 'Noto Serif', Garamond, Georgia, 'Times New Roman', serif; }

        .text3 { font-family: 'DejaVu Sans', 'Noto Sans', Helvetica, sans-serif; }

        .text1 {
            color: #fff;
            animation-name: text1;
            z-index: 4;
            opacity: 0;
        }

        .text2 {
            color: #fff;
            text-shadow: 2px 2px 8px #000;
            z-index: 3;
            opacity: 0;
            display: flex;
            flex-direction: column;
            margin-top: 2.3rem;
            animation-name: text2;
        }

        .text2-b {
            opacity: 0;
            animation-name: text2b;
        }

        .text3 {
            font-size: 50vw;
            font-weight: 700;
            letter-spacing: -5rem;
            color: #0000;
            -webkit-text-stroke: 2px #b7b7b7;
            animation-name: text3;
            z-index: 1;
            opacity: 0;
        }

    </style>
</head>

<body>

    <!--
        Being smart and savvy pays off; The biggest threat in your system is you.
    -->

    <div class="text1">Being smart and savvy pays off</div>
    <div class="text2">
        <div class="text2-a">The biggest threat to your system</div>
        <div class="text2-b">&nbsp;is</div>
    </div>
    <div class="text3">YOU</div>

</body>

</html>
